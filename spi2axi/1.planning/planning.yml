topic: SPI2AXI Bridge — SPI Slave to AXI4-Lite Master Bridge
mode: A
max_iterations: 5
source_files:
  - 1.planning/source_raw.md
  - 1.planning/source_spec.md
output_requirements:
  document_type: block  # Block-level IP
  chapters:
    - 模块概述 (Module Overview)
    - 接口定义 (Interface Definition)
    - 子模块划分 (Sub-Module Partition)
    - 有限状态机 (FSM)
    - 流水线 (Pipeline)
    - 数据通路 (Datapath)
    - 配置寄存器 (CSR)
    - 时钟与复位 (Clock & Reset)
    - SDC约束 (SDC)
    - 实现要点 (Implementation)
    - 验证方案 (Verification)
    - DFT设计 (DFT)
    - 交付物 (Delivery)
    - 修订记录 (Revision)
  formats:
    - html
    - drawio
    - markdown
  timestamp_format: "YYYY-MM-DD-HHMM"
design_research:
  enabled: false  # 源文档已包含核心内容，不需要外部研究
templates:
  block_hld: agents/template/03_block_arch.HLD.md
  block_lld: agents/template/04_block_micro.LLD.md
